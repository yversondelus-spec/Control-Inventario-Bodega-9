name: Actualizar Dashboard Inventario

on:
  schedule:
    # Cada día hábil a las 08:00 AM Chile (UTC-3 = 11:00 UTC)
    - cron: '0 11 * * 1-5'
  workflow_dispatch:  # También se puede correr manualmente desde GitHub

permissions:
  contents: write

jobs:
  actualizar-inventario:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests pandas openpyxl numpy

      - name: Generar dashboard inventario
        env:
          SHEET_URL_INV: ${{ secrets.SHEET_URL_INV }}
        run: python generar_inventario.py

      - name: Commit y push index_inventario.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index_inventario.html
          git diff --staged --quiet || git commit -m "Inventario actualizado $(date +'%d/%m/%Y %H:%M')"
          git push
